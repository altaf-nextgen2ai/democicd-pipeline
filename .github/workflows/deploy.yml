name: Deploy Django to EC2
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Auto Deploy to EC2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/democicd-pipeline
            git pull origin main
            source democicd-pipeline/venv/bin/activate
            pip install -r democicd-pipeline/requirements.txt
            python democicd-pipeline/manage.py migrate --no-input
            python democicd-pipeline/manage.py collectstatic --no-input
            sudo systemctl restart gunicorn